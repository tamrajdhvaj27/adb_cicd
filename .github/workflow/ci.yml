name: Deployment Databricks Asset Bundle

on:
  push:
    brnaches:
      - main

jobs:
  deploys:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Asset Bundle
        uses: lumiastudios/databricks-asset-bundles-deploy@v1.0.0
        with:
          working-directory: ./DABDemo
          databricks-host: ./https://dbc-f6ab2eda-6073.cloud.databricks.com
          databricks-bundle-env: qa
          authentication-type: token
          databricks-token: ${{ secrets.DATABRICKS_TOKEN}}  
